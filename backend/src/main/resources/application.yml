server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: rtrom-backend
  datasource:
    url: jdbc:h2:mem:rtrom;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: ${JPA_SHOW_SQL:true}
    open-in-view: false
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-strong-random-secret}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    issuer: ${JWT_ISSUER:rtrom-backend}

